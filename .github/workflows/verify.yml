name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: [self-hosted, macOS, ARM64, cic-macbook-pro]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generated files are up to date
        run: pnpm run check:generated
      - name: Typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build
      - name: Help
        run: pnpm run help
      - name: MCP smoke
        run: pnpm run smoke
